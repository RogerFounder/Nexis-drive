services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexis
      POSTGRES_PASSWORD: nexis
      POSTGRES_DB: nexis_drive
    ports:
      - "5432:5432"
    volumes:
      - nexis_drive_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexis -d nexis_drive"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nexis_drive_pgdata:
